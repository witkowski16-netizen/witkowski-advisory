<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf — Witkowski Advisory</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c08;
      --surface: #0d130d;
      --surface2: #121a12;
      --border: #1e2e1e;
      --text: #d8ead8;
      --muted: #5a7a5a;
      --gold: #c9a84c;
      --gold-dim: #6a4e1a;
      --red: #e05555;
      --red-dim: #3a1212;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── APP SHELL ── */
    #app { display: block; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0d1f0d 0%, #111811 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: #c8e6c8;
      letter-spacing: -0.3px;
    }
    .header-left p {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .tab-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #1a3a1a;
      border-color: #3a6a3a;
      color: #7acc7a;
    }
    /* ── CLUB TABS ── */
    .club-tabs {
      display: flex;
      overflow-x: auto;
      gap: 6px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .club-tabs::-webkit-scrollbar { display: none; }
    .club-tab {
      flex-shrink: 0;
      padding: 7px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    /* ── CHEAT SHEET ── */
    #tab-cheatsheet { display: block; }
    #tab-scores { display: none; }

    .main-pad { padding: 16px 16px 60px; }

    /* Hero card */
    .hero-card {
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--club-color) 0%, transparent 60%);
      opacity: 0.6;
      border-radius: 14px;
    }
    .hero-card > * { position: relative; }
    .hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }
    .hero-loft { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .club-badge {
      padding: 5px 11px;
      border-radius: 6px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Ball position */
    .bp-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .bp-track { position: relative; height: 30px; }
    .bp-bar { position: absolute; top: 13px; left: 9%; right: 9%; height: 2px; background: var(--border); border-radius: 2px; }
    .bp-foot {
      position: absolute;
      top: 3px;
      width: 22px; height: 22px;
      background: #1e2e1e;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: var(--muted);
    }
    .bp-foot.lead { left: 4%; }
    .bp-foot.trail { right: 4%; }
    .bp-ball {
      position: absolute;
      top: 6px;
      width: 16px; height: 16px;
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px currentColor;
    }
    .bp-center { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 1px; height: 16px; background: var(--border); }
    .bp-text { font-size: 11px; color: #8aaa8a; text-align: center; margin-top: 6px; }

    /* Grid */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .info-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .info-icon { font-size: 14px; margin-bottom: 4px; }
    .info-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .info-val { font-size: 12px; color: var(--text); line-height: 1.4; }

    /* Key thought */
    .thought-card {
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
    }
    .thought-lbl { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .thought-text { font-size: 14px; color: var(--text); line-height: 1.6; font-style: italic; }

    /* Watch out */
    .warn-card {
      background: var(--red-dim);
      border: 1px solid #5a2020;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
    }
    .warn-lbl { font-size: 9px; color: var(--red); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .warn-text { font-size: 12px; color: #d4aaaa; line-height: 1.5; }

    /* Grip */
    .grip-card {
      background: #0a1520;
      border: 1px solid #1a3050;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
    }
    .grip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .grip-lbl { font-size: 9px; color: #5a9adf; letter-spacing: 1.5px; text-transform: uppercase; }
    .grip-pressure-badge {
      font-size: 10px; color: #7ab8f0;
      background: rgba(90,154,223,0.15);
      border: 1px solid rgba(90,154,223,0.3);
      border-radius: 20px; padding: 3px 10px;
    }
    .grip-meter { display: flex; gap: 3px; margin-bottom: 10px; }
    .grip-dot { flex: 1; height: 6px; border-radius: 3px; background: #1a2a3a; }
    .grip-dot.filled-low { background: #4ade80; }
    .grip-dot.filled-mid { background: #5a9adf; }
    .grip-dot.filled-high { background: #f87171; }
    .grip-style { font-size: 12px; color: #a8c8e8; line-height: 1.6; margin-bottom: 8px; }
    .grip-tip { font-size: 11px; color: #7ab8f0; font-style: italic; border-left: 2px solid #2a5a8a; padding-left: 10px; }

    /* Faldo */
    .faldo-card {
      background: linear-gradient(135deg, #1a1608 0%, #0f0e0a 100%);
      border: 1px solid #4a3a10;
      border-radius: 10px;
      padding: 14px;
    }
    .faldo-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .faldo-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #b8960c, #8a6f09);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fef3c7; flex-shrink: 0;
    }
    .faldo-name { font-size: 10px; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; }
    .faldo-title { font-size: 9px; color: var(--gold-dim); }
    .faldo-quote {
      font-size: 12px; color: #e8d88a; line-height: 1.7; font-style: italic;
      border-left: 2px solid var(--gold); padding-left: 12px;
    }

    /* Chris */
    .chris-card {
      background: linear-gradient(135deg, #12100e 0%, #0d0c0a 100%);
      border: 1px solid #3a2a1a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
    }
    .chris-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .chris-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #5a3a1a, #3a2510);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .chris-name { font-size: 10px; color: #c87a3a; letter-spacing: 1.5px; text-transform: uppercase; }
    .chris-title { font-size: 9px; color: #5a3a1a; }
    .chris-quote {
      font-size: 12px; color: #d4aa88; line-height: 1.7; font-style: italic;
      border-left: 2px solid #5a3a1a; padding-left: 12px;
    }

    /* Nav */
    .club-nav { display: flex; gap: 8px; margin-top: 16px; }
    .nav-btn {
      flex: 1; padding: 11px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:disabled { color: #2a3a2a; cursor: default; }
    .nav-btn:not(:disabled):hover { border-color: #3a5a3a; color: var(--text); }

    /* ── SCORES TAB ── */
    .scores-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .scores-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: #c8e6c8;
    }
    .add-round-btn {
      background: #1a3a1a;
      border: 1px solid #3a6a3a;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #7acc7a;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .add-round-btn:hover { background: #243a24; }

    /* Add round form */
    .round-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      display: none;
    }
    .round-form.open { display: block; }
    .round-form h3 {
      font-family: 'Playfair Display', serif;
      font-size: 15px; color: #b8d4b8; margin-bottom: 14px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #3a6a3a; }
    .form-group select option { background: #0d130d; }
    .form-group textarea { resize: vertical; min-height: 60px; font-size: 12px; }
    .form-full { grid-column: 1 / -1; }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .save-btn {
      flex: 1; padding: 10px;
      background: #1a3a1a; border: 1px solid #3a6a3a;
      border-radius: 8px; color: #7acc7a;
      font-family: 'DM Mono', monospace; font-size: 12px;
      cursor: pointer; letter-spacing: 0.5px;
    }
    .cancel-btn {
      padding: 10px 16px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 12px;
      cursor: pointer;
    }

    /* Stats strip */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }
    .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: #c8e6c8; line-height: 1;
      margin-bottom: 4px;
    }
    .stat-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

    /* Rounds list */
    .round-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      position: relative;
    }
    .round-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .round-course {
      font-family: 'Playfair Display', serif;
      font-size: 15px; color: #c8e6c8;
    }
    .round-score-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px; font-weight: 700;
      font-family: 'Playfair Display', serif;
    }
    .round-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .round-note { font-size: 11px; color: #7a9a7a; font-style: italic; line-height: 1.4; }
    .round-delete {
      position: absolute; top: 10px; right: 48px;
      background: transparent; border: none;
      color: #4a2a2a; font-size: 14px; cursor: pointer; padding: 4px;
      transition: color 0.2s;
    }
    .round-delete:hover { color: var(--red); }

    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 13px; font-style: italic;
    }
    .empty-state div { font-size: 32px; margin-bottom: 12px; }

    /* Handicap trend */
    .trend-section { margin-bottom: 16px; }
    .trend-title {
      font-size: 10px; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .trend-bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 14px 8px;
      overflow-x: auto;
    }
    .trend-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 60px;
      min-width: fit-content;
    }
    .t-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .t-bar {
      width: 20px;
      border-radius: 3px 3px 0 0;
      transition: height 0.4s ease;
      min-height: 4px;
    }
    .t-bar-lbl { font-size: 8px; color: var(--muted); white-space: nowrap; }
    /* ── FIELD GUIDE ── */
    .fg-category-tabs {
      display: flex; overflow-x: auto; gap: 6px;
      padding: 12px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); scrollbar-width: none;
      position: sticky; top: 60px; z-index: 50;
    }
    .fg-category-tabs::-webkit-scrollbar { display: none; }
    .fg-cat-btn {
      flex-shrink: 0; padding: 7px 13px; border-radius: 20px;
      border: 1.5px solid var(--border); background: transparent;
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .fg-cat-btn.active {
      border-color: #c9a84c; color: #c9a84c; background: rgba(201,168,76,0.1);
    }
    .fg-section { margin-bottom: 10px; }
    .fg-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin: 0 0 10px; padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
    }
    .fg-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 8px; overflow: hidden;
      cursor: pointer;
    }
    .fg-card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px;
    }
    .fg-card-left { display: flex; align-items: center; gap: 12px; }
    .fg-icon {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .fg-title { font-size: 13px; color: #c8e6c8; margin-bottom: 2px; }
    .fg-subtitle { font-size: 10px; color: var(--muted); }
    .fg-chevron { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
    .fg-chevron.open { transform: rotate(180deg); }
    .fg-body {
      display: none; padding: 0 16px 16px; border-top: 1px solid var(--border);
    }
    .fg-body.open { display: block; }
    .fg-step {
      display: flex; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .fg-step:last-child { border-bottom: none; }
    .fg-step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #c9a84c; flex-shrink: 0; margin-top: 1px;
    }
    .fg-step-text { font-size: 12px; color: #a8c8a8; line-height: 1.6; }
    .fg-step-text strong { color: #c8e6c8; font-weight: 500; }
    .fg-tip {
      margin-top: 10px; padding: 10px 12px;
      background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px; font-size: 11px; color: #e8d88a; font-style: italic;
    }
    .fg-rule-box {
      margin-top: 10px; padding: 10px 12px;
      background: rgba(224,85,85,0.08); border: 1px solid rgba(224,85,85,0.2);
      border-radius: 8px;
    }
    .fg-rule-label { font-size: 9px; color: #f87171; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
    .fg-rule-text { font-size: 11px; color: #d4aaaa; line-height: 1.6; }
    .fg-dist-table { width: 100%; margin-top: 10px; border-collapse: collapse; }
    .fg-dist-table th {
      font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
      padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: left;
    }
    .fg-dist-table td {
      font-size: 12px; color: #a8c8a8; padding: 8px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .fg-dist-table tr:last-child td { border-bottom: none; }
    .fg-dist-table td:first-child { color: #c8e6c8; }
    .fg-badge {
      display: inline-block; font-size: 9px; letter-spacing: 1px;
      text-transform: uppercase; padding: 2px 8px; border-radius: 10px; margin-left: 6px;
    }
    .fg-badge-pen { background: rgba(224,85,85,0.2); color: #f87171; }
    .fg-badge-free { background: rgba(74,222,128,0.2); color: #4ade80; }
    .fg-badge-choice { background: rgba(251,146,60,0.2); color: #fb923c; }
  </style>
</head>
<body>


<!-- ── APP ── -->
<div id="app">

  <div class="header">
    <div class="header-left">
      <h1>⛳ Golf Vault</h1>
      <p>6'2" · Targeting 10 HCP</p>
    </div>
    <div class="header-right">
      <button class="tab-btn active" id="btn-cheatsheet" onclick="switchTab('cheatsheet')">Clubs</button>
      <button class="tab-btn" id="btn-field" onclick="switchTab('field')">Field Guide</button>
      <button class="tab-btn" id="btn-scores" onclick="switchTab('scores')">Scores</button>
    </div>
  </div>

  <!-- ── CHEAT SHEET TAB ── -->
  <div id="tab-cheatsheet">
    <div class="club-tabs" id="club-tabs"></div>
    <div class="main-pad" id="club-detail"></div>
  </div>

  <!-- ── FIELD GUIDE TAB ── -->
  <div id="tab-field" style="display:none;">
    <div class="main-pad" id="field-content"></div>
  </div>

  <!-- ── SCORES TAB ── -->
  <div id="tab-scores" style="display:none;">
    <div class="main-pad">
      <div class="scores-header">
        <h2>Score Tracker</h2>
        <button class="add-round-btn" onclick="toggleForm()">+ Add Round</button>
      </div>

      <!-- Add round form -->
      <div class="round-form" id="round-form">
        <h3>Log a Round</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Course</label>
            <input type="text" id="f-course" placeholder="Glencoe Golf Club" />
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="f-date" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Score</label>
            <input type="number" id="f-score" placeholder="92" min="50" max="150" />
          </div>
          <div class="form-group">
            <label>Par</label>
            <input type="number" id="f-par" placeholder="72" min="60" max="74" value="72" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fairways Hit</label>
            <input type="text" id="f-fir" placeholder="7/14" />
          </div>
          <div class="form-group">
            <label>Putts</label>

// ── TABS ──
function switchTab(tab) {
  document.getElementById('tab-cheatsheet').style.display = tab === 'cheatsheet' ? 'block' : 'none';
  document.getElementById('tab-field').style.display     = tab === 'field'       ? 'block' : 'none';
  document.getElementById('tab-scores').style.display    = tab === 'scores'      ? 'block' : 'none';
  document.getElementById('btn-cheatsheet').classList.toggle('active', tab === 'cheatsheet');
  document.getElementById('btn-field').classList.toggle('active', tab === 'field');
  document.getElementById('btn-scores').classList.toggle('active', tab === 'scores');
  if (tab === 'scores') renderScores();
  if (tab === 'field') renderFieldGuide();
}

// ── SCORE TRACKER ──
function getRounds() {
  return JSON.parse(localStorage.getItem(ROUNDS_KEY) || '[]');
}
function saveRounds(rounds) {
  localStorage.setItem(ROUNDS_KEY, JSON.stringify(rounds));
}

let formOpen = false;
function toggleForm() {
  formOpen = !formOpen;
  document.getElementById('round-form').classList.toggle('open', formOpen);
  if (formOpen) document.getElementById('f-course').focus();
}

function saveRound() {
  const course = document.getElementById('f-course').value.trim();
  const date = document.getElementById('f-date').value;
  const score = parseInt(document.getElementById('f-score').value);
  const par = parseInt(document.getElementById('f-par').value) || 72;
  const fir = document.getElementById('f-fir').value.trim();
  const putts = parseInt(document.getElementById('f-putts').value) || null;
  const notes = document.getElementById('f-notes').value.trim();

  if (!course || !date || isNaN(score)) {
    alert('Please fill in Course, Date, and Score at minimum.');
    return;
  }

  const rounds = getRounds();
  rounds.unshift({ id: Date.now(), course, date, score, par, fir, putts, notes });
  saveRounds(rounds);

  // Reset form
  ['f-course','f-score','f-fir','f-putts','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-par').value = '72';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-date').value = today;

  toggleForm();
  renderScores();
}

function deleteRound(id) {
  if (!confirm('Delete this round?')) return;
  const rounds = getRounds().filter(r => r.id !== id);
  saveRounds(rounds);
  renderScores();
}

function renderScores() {
  const rounds = getRounds();

  // Stats
  if (rounds.length === 0) {
    document.getElementById('stat-rounds').textContent = '0';
    document.getElementById('stat-best').textContent = '—';
    document.getElementById('stat-avg').textContent = '—';
    document.getElementById('stat-putts').textContent = '—';
  } else {
    const scores = rounds.map(r => r.score);
    const avg = Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
    const best = Math.min(...scores);
    const puttRounds = rounds.filter(r => r.putts);
    const avgPutts = puttRounds.length ? Math.round(puttRounds.reduce((a,r)=>a+r.putts,0)/puttRounds.length) : null;
    document.getElementById('stat-rounds').textContent = rounds.length;
    document.getElementById('stat-best').textContent = best;
    document.getElementById('stat-avg').textContent = avg;
    document.getElementById('stat-putts').textContent = avgPutts || '—';
  }

  // Trend chart
  const trendSection = document.getElementById('trend-section');
  const trendBars = document.getElementById('trend-bars');
  if (rounds.length >= 2) {
    trendSection.style.display = 'block';
    const last10 = [...rounds].reverse().slice(-10);
    const scores = last10.map(r => r.score);
    const minS = Math.min(...scores) - 3;
    const maxS = Math.max(...scores) + 3;
    const range = maxS - minS || 1;
    trendBars.innerHTML = last10.map(r => {
      const heightPct = ((r.score - minS) / range) * 100;
      const h = Math.max(8, Math.round(heightPct * 0.55));
      const diff = r.score - r.par;
      const color = diff <= 0 ? '#4ade80' : diff <= 5 ? '#fb923c' : diff <= 10 ? '#f87171' : '#e05555';
      const d = new Date(r.date + 'T00:00:00');
      const lbl = `${d.getMonth()+1}/${d.getDate()}`;
      return `<div class="t-bar-wrap">
        <div class="t-bar" style="height:${h}px;background:${color}" title="${r.course}: ${r.score}"></div>
        <div class="t-bar-lbl">${r.score}</div>
        <div class="t-bar-lbl">${lbl}</div>
      </div>`;
    }).join('');
  } else {
    trendSection.style.display = 'none';
  }

  // Rounds list
  const list = document.getElementById('rounds-list');
  if (rounds.length === 0) {
    list.innerHTML = `<div class="empty-state"><div>🏌️</div>No rounds logged yet.<br>Hit "Add Round" to track your first score.</div>`;
    return;
  }

  list.innerHTML = rounds.map(r => {
    const diff = r.score - r.par;
    const sign = diff > 0 ? '+' : '';
    const color = diff <= 0 ? '#4ade80' : diff <= 5 ? '#fb923c' : diff <= 10 ? '#f87171' : '#e05555';
    const bg = diff <= 0 ? '#0d2a0d' : diff <= 5 ? '#2a1a0a' : '#2a0d0d';
    const d = new Date(r.date + 'T00:00:00');
    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const meta = [dateStr, r.fir ? `FIR: ${r.fir}` : null, r.putts ? `Putts: ${r.putts}` : null].filter(Boolean).join(' · ');
    return `<div class="round-card">
      <button class="round-delete" onclick="deleteRound(${r.id})" title="Delete">✕</button>
      <div class="round-top">
        <div class="round-course">${r.course}</div>
        <div class="round-score-badge" style="background:${bg};color:${color}">${r.score} <span style="font-size:11px;opacity:0.7">(${sign}${diff})</span></div>
      </div>
      <div class="round-meta">${meta}</div>
      ${r.notes ? `<div class="round-note">"${r.notes}"</div>` : ''}
    </div>`;
  }).join('');
}

let fgOpen = {};

function renderFieldGuide() {
  const cat = fieldCategories[activeFGCat];
  const items = fieldData[cat];

  const catTabs = fieldCategories.map((c, i) => `
    <button class="fg-cat-btn ${i === activeFGCat ? 'active' : ''}" onclick="setFGCat(${i})">${c}</button>
  `).join('');

  const cards = items.map((item, idx) => {
    const key = `${activeFGCat}-${idx}`;
    const isOpen = fgOpen[key];

    const stepsHTML = item.steps.map((s, si) => `
      <div class="fg-step">
        <div class="fg-step-num">${si + 1}</div>
        <div class="fg-step-text"><strong>${s.t}:</strong> ${s.b}</div>
      </div>
    `).join('');

    const tableHTML = item.table ? `
      <table class="fg-dist-table">
        <thead><tr>${item.table.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${item.table.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    ` : '';

    const tipHTML = item.tip ? `<div class="fg-tip">💡 ${item.tip}</div>` : '';
    const ruleHTML = item.rule ? `
      <div class="fg-rule-box">
        <div class="fg-rule-label">📖 ${item.rule.label}</div>
        <div class="fg-rule-text">${item.rule.text}</div>
      </div>` : '';

    return `
      <div class="fg-card" onclick="toggleFG('${key}')">
        <div class="fg-card-header">
          <div class="fg-card-left">
            <div class="fg-icon" style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2)">${item.icon}</div>
            <div>
              <div class="fg-title">${item.title}</div>
              <div class="fg-subtitle">${item.sub}</div>
            </div>
          </div>
          <div class="fg-chevron ${isOpen ? 'open' : ''}">▼</div>
        </div>
        <div class="fg-body ${isOpen ? 'open' : ''}">
          ${stepsHTML}${tableHTML}${tipHTML}${ruleHTML}
        </div>
      </div>`;
  }).join('');

  document.getElementById('field-content').innerHTML = `
    <div class="fg-category-tabs">${catTabs}</div>
    <div style="padding:0 0 60px">${cards}</div>
  `;
}

function setFGCat(i) {
  activeFGCat = i;
  fgOpen = {};
  renderFieldGuide();
}

function toggleFG(key) {
  fgOpen[key] = !fgOpen[key];
  renderFieldGuide();
}
</script>
