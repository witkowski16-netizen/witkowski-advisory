  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ink:#0f0f0d;--deep:#161612;--surface:#1e1e19;--card:#232320;
      --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);
      --teal:#2a7a6a;--teal-light:#3db89a;
      --cream:#f2ede4;--muted:rgba(242,237,228,0.45);--muted2:rgba(242,237,228,0.25);
      --serif:'Libre Baskerville',Georgia,serif;
      --mono:'IBM Plex Mono',monospace;
      --sans:'IBM Plex Sans',sans-serif;
    }
    html{scroll-behavior:smooth;}
    body{background:var(--ink);color:var(--cream);font-family:var(--sans);font-size:15px;line-height:1.7;overflow-x:hidden;}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:24px 64px;background:rgba(15,15,13,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(14px);}
    .logo{font-family:var(--serif);font-size:17px;letter-spacing:.06em;color:var(--cream);text-decoration:none;display:flex;flex-direction:column;gap:1px;}
    .logo-sub{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal-light);}
    .nav-links{display:flex;gap:36px;align-items:center;}
    .nav-links a{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
    .nav-links a:hover,.nav-links a.active{color:var(--cream);}
    .nav-cta{color:var(--ink)!important;background:var(--teal-light);padding:10px 22px;transition:background .2s!important;}
    .nav-cta:hover{background:#5bcfb0!important;}
    .post-wrap{max-width:720px;margin:0 auto;padding:140px 40px 100px;}
    .back-link{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;margin-bottom:48px;}
    .back-link:hover{color:var(--teal-light);}
    .post-date{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;}
    .post-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;}
    .post-tag{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-light);border:1px solid rgba(61,184,154,.25);padding:3px 10px;background:rgba(61,184,154,.04);}
    h1{font-family:var(--serif);font-size:clamp(32px,5vw,52px);font-weight:400;line-height:1.1;letter-spacing:-.01em;color:var(--cream);margin-bottom:8px;}
    .post-divider{width:48px;height:2px;background:var(--teal-light);margin:36px 0;}
    .post-body{font-size:15px;line-height:1.85;color:rgba(242,237,228,0.82);font-weight:300;}
    .post-body p{margin-bottom:24px;}
    .post-body strong{color:var(--cream);font-weight:500;}
    .post-body h3{font-family:var(--serif);font-weight:400;font-style:italic;color:var(--teal-light);margin:40px 0 16px;font-size:22px;line-height:1.2;}
    .post-body blockquote{border-left:2px solid var(--teal-light);padding:16px 24px;margin:32px 0;background:rgba(61,184,154,.05);font-style:italic;color:var(--muted);}
    .author-strip{margin-top:64px;padding:32px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:20px;}
    .author-avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:rgba(61,184,154,.12);border:1px solid rgba(61,184,154,.3);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;color:var(--teal-light);}
    .author-name{font-family:var(--serif);font-size:16px;color:var(--cream);margin-bottom:3px;}
    .author-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-light);}
    .more-posts{margin-top:80px;padding-top:48px;border-top:1px solid var(--border);}
    .more-label{font-family:var(--mono);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--teal-light);margin-bottom:28px;}
    .more-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
    .more-card{background:var(--ink);padding:28px;text-decoration:none;color:inherit;transition:background .2s;display:block;}
    .more-card:hover{background:var(--surface);}
    .more-card-date{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;}
    .more-card h3{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--cream);line-height:1.3;font-style:normal;}
    .post-cta{margin-top:64px;padding:40px;background:rgba(61,184,154,.06);border:1px solid rgba(61,184,154,.2);text-align:center;}
    .post-cta h3{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:10px;font-style:normal;color:var(--cream);}
    .post-cta p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.8;}
    .post-cta a{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);background:var(--teal-light);padding:13px 28px;text-decoration:none;display:inline-block;transition:background .2s;}
    .post-cta a:hover{background:#5bcfb0;}
    footer{padding:36px 64px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--deep);}
    .footer-right{display:flex;gap:32px;align-items:center;}
    .footer-right a{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted2);text-decoration:none;transition:color .2s;}
    .footer-right a:hover{color:var(--teal-light);}
    .footer-copy{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted2);}
    @media(max-width:768px){nav,footer{padding-left:24px;padding-right:24px;}.post-wrap{padding:120px 24px 80px;}.more-grid{grid-template-columns:1fr;}.nav-links{display:none;}}

  </div>
</footer>
<script>
  function formatDate(str){const d=new Date(str+'T12:00:00');return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
  function renderBody(text){
    return text.split('\n\n').map(para=>{
      para=para.trim();if(!para)return'';
      para=para.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
      if(para.startsWith('<strong>')&&para.indexOf('</strong>')<70){
        const h=para.match(/<strong>(.*?)<\/strong>/)?.[1]||'';
        const rest=para.replace(/<strong>.*?<\/strong>/,'').trim();
        return`<h3>${h}</h3>${rest?`<p>${rest}</p>`:''}`;
      }
      return`<p>${para}</p>`;
    }).join('');
  }
  async function loadPost(){
    const slug=new URLSearchParams(window.location.search).get('slug');
    if(!slug){window.location.href='blog.html';return;}
    try{
      const res=await fetch('posts.json?v='+Date.now());
      const posts=await res.json();
      const post=posts.find(p=>p.slug===slug);
      if(!post){window.location.href='blog.html';return;}
      document.title=post.title+' — Witkowski Advisory Group';
      const others=posts.filter(p=>p.slug!==slug).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,2);
      document.getElementById('postContent').innerHTML=`
        <div>
          <div class="post-date">${formatDate(post.date)}</div>
          <h1>${post.title}</h1>
          <div class="post-tags">${post.tags.map(t=>`<span class="post-tag">${t}</span>`).join('')}</div>
        </div>
        <div class="post-divider"></div>
        <div class="post-body">${renderBody(post.body)}</div>
        <div class="author-strip">
          <div class="author-avatar">EW</div>
          <div>
            <div class="author-name">Evan Witkowski, CIPM</div>
            <div class="author-title">Director, Institutional Relationships · Automation & AI Consultant</div>
          </div>
        </div>
        <div class="post-cta">
          <h3>Let's put this into practice.</h3>
          <p>Whether you're looking to automate workflows, deploy AI agents, or improve your business development systems — I'd love to hear about your challenge.</p>
          <a href="index.html#contact">Start a Conversation →</a>
        </div>
        ${others.length?`
        <div class="more-posts">
          <div class="more-label">More Insights</div>
          <div class="more-grid">
            ${others.map(p=>`<a class="more-card" href="post.html?slug=${p.slug}"><div class="more-card-date">${formatDate(p.date)}</div><h3>${p.title}</h3></a>`).join('')}
          </div>
        </div>`:''}
      `;
    }catch(e){
      document.getElementById('postContent').innerHTML=`<p style="color:var(--muted)">Could not load post. <a href="blog.html" style="color:var(--teal-light)">Back to Insights →</a></p>`;
    }
  }
  loadPost();
</script>
